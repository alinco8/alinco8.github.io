pre-commit:
  commands:
    oxlint:
      glob: "*.{js,ts,svelte}"
      run: bunx oxlint --deny-warnings --no-error-on-unmatched-pattern {staged_files}
    oxfmt:
      glob: "*.{js,ts,svelte}"
      run: bunx oxfmt --write {staged_files}
      stage_fixed: true
commit-msg:
  jobs:
    - run: bunx commitlint --edit {1}
